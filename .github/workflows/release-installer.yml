name: Release Installer ZIP

on:
  push:
    branches: [master]
    paths:
      - 'install.bat'
      - 'install.ps1'
      - 'dict-server.ps1'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create installer.zip
        run: zip installer.zip install.bat install.ps1 dict-server.ps1

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: installer-latest
          name: インストーラー (最新版)
          body: |
            ## インストール手順

            1. **installer.zip** をダウンロードして任意のフォルダに解凍
            2. `install.bat` を右クリック → **管理者として実行**
            3. Word を再起動 → 「開発」タブ → 「アドイン」→「共有フォルダ」→ Word Panel を追加
          files: installer.zip
          make_latest: true
